name: 反馈失效
description: 反馈一个可能失效或行为变化的 URL Scheme
title: "Report broken scheme: "
labels: ["scheme", "broken-feedback", "needs-verification"]
body:
  - type: input
    id: scheme
    attributes:
      label: URL Scheme
      placeholder: weixin://
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      placeholder: 应该打开对应 App 或页面
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: 无响应、打开失败、打开了错误页面等
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 测试环境
      placeholder: 设备、iOS 版本、App 版本、从 Safari/快捷指令/其他入口打开
    validations:
      required: true
