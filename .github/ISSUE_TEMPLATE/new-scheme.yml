name: 新增 URL Scheme
description: 提交一个新的 iOS URL Scheme
title: "Add scheme: "
labels: ["scheme", "needs-review"]
body:
  - type: input
    id: app
    attributes:
      label: App 名称
      placeholder: 微信
    validations:
      required: true
  - type: input
    id: bundle
    attributes:
      label: Bundle ID
      placeholder: com.tencent.xin
  - type: input
    id: scheme
    attributes:
      label: URL Scheme
      placeholder: weixin://
    validations:
      required: true
  - type: input
    id: action
    attributes:
      label: 用途
      placeholder: 打开 App
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: 验证状态
      options:
        - verified
        - partial
        - unknown
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 测试环境
      description: 设备、iOS 版本、App 版本、测试入口。
      placeholder: iPhone 15 Pro, iOS 17.5, App 8.0.x, Safari
  - type: textarea
    id: source
    attributes:
      label: 来源
      placeholder: 链接、截图说明或手动测试说明
    validations:
      required: true
